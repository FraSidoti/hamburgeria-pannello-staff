<div class="menu-container">
  <div class="header-section">
    <h2>🍔 Gestione Catalogo</h2>
    <p>Personalizza l'offerta digitale del tuo Burger Shop</p>
  </div>

  <!-- FORM DI AGGIUNTA -->
  <div class="form-card">
    <h3>Nuovo Prodotto</h3>
    <div class="form-grid">
      <div class="input-group">
        <label>Nome del piatto</label>
        <input [(ngModel)]="newProduct.name" placeholder="Inserire il nome del prodotto">
      </div>
      
      <div class="input-group">
        <label>Prezzo (€)</label>
        <input [(ngModel)]="newProduct.price" type="number" placeholder="0.00">
      </div>

      <div class="input-group">
        <label>URL Immagine</label>
        <input [(ngModel)]="newProduct.image" placeholder="Incolla qui il link della foto">
      </div>

      <div class="input-group">
        <label>Categoria</label>
        <select [(ngModel)]="newProduct.category">
          <option value="panini">🍔 Panini</option>
          <option value="bevande">🥤 Bevande</option>
          <option value="menu">📦 Menu Completi</option>
        </select>
      </div>

      <button class="btn-submit" (click)="saveProduct()">
        <span>+ Aggiungi al listino</span>
      </button>
    </div>
  </div>

  <!-- LISTA PRODOTTI -->
  <div class="header-section">
    <h3 style="font-size: 1.5rem; font-weight: 700;">Prodotti Attivi</h3>
  </div>

  <div class="product-grid">
    <div *ngFor="let p of products" class="product-card">
      <img [src]="p.image" class="product-image" alt="Piatto" onerror="this.src='https://placehold.co/400x300?text=Immagine+non+disponibile'">
      
      <div class="product-info">
        <span class="category-tag">{{p.category}}</span>
        <h4 class="product-name">{{p.name}}</h4>
        <p class="product-price">{{p.price | number:'1.2-2'}} €</p>
        
        <div style="margin-top: auto;">
          <button class="btn-delete" (click)="removeProduct(p.id)">
            🗑️ Rimuovi dal menu
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- EMPTY STATE -->
  <div *ngIf="products.length === 0" style="text-align: center; padding: 60px; color: #86868b;">
    <p style="font-size: 1.2rem;">Il catalogo è vuoto. Comincia ad aggiungere i tuoi piatti!</p>
  </div>
</div>
